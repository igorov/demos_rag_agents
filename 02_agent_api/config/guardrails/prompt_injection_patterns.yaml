# Patrones de detección de Prompt Injection (Capa 2 del InputGuardrail).
# Cada patrón es una expresión regular evaluada con re.IGNORECASE | re.MULTILINE | re.DOTALL.
# Agrupados en 5 categorías según HU_InputGuardrail.md (Capa 2).

sobrescritura:
  - "<<SYS>>"
  - "<</SYS>>"
  - "\\[SYSTEM\\]"
  - "\\[/SYSTEM\\]"
  - "\\[INST\\]"
  - "system\\s*:\\s*you\\s+are"
  - "nuevo\\s+system\\s*prompt"
  - "new\\s+system\\s*prompt"
  - "override\\s+(the\\s+)?system\\s+prompt"
  - "sobrescrib(e|ir|iendo)\\s+(el\\s+)?(system\\s*prompt|las\\s+instrucciones)"
  - "reemplaza\\s+tus\\s+instrucciones"
  - "replace\\s+your\\s+instructions"
  - "a\\s+partir\\s+de\\s+ahora\\s+(tus?\\s+)?(nuevas?\\s+)?instrucciones?\\s+son"
  - "from\\s+now\\s+on\\s+your\\s+instructions\\s+are"
  - "tus\\s+nuevas\\s+reglas\\s+son"
  - "your\\s+new\\s+rules\\s+are"
  - "\\{\\{\\s*system\\s*\\}\\}"

amnesia:
  - "ignore\\s+all\\s+previous\\s+instructions"
  - "ignora\\s+(todas\\s+)?las\\s+instrucciones\\s+anteriores"
  - "ignora\\s+todo\\s+lo\\s+anterior"
  - "olvida\\s+(todo\\s+)?lo\\s+que\\s+te\\s+dijeron"
  - "forget\\s+(everything|all)\\s+(you\\s+)?(were\\s+told|above)"
  - "disregard\\s+(the\\s+)?(above|previous)\\s+instructions"
  - "descarta\\s+(las\\s+)?instrucciones\\s+previas"
  - "no\\s+hagas\\s+caso\\s+a\\s+(las\\s+)?instrucciones\\s+anteriores"
  - "ignore\\s+your\\s+(system\\s+)?prompt"
  - "ignora\\s+tu\\s+(system\\s*)?prompt"
  - "elimina\\s+(tu\\s+)?memoria\\s+(de\\s+)?(contexto|instrucciones)"
  - "reset\\s+your\\s+(instructions|memory|context)"
  - "reinicia\\s+tus\\s+instrucciones"
  - "pretend\\s+(you\\s+)?(never|didn't)\\s+(saw|received)\\s+(any\\s+)?(prior|previous)\\s+instructions"

jailbreak:
  - "DAN\\s+mode"
  - "modo\\s+DAN"
  - "do\\s+anything\\s+now"
  - "modo\\s+desarrollador"
  - "developer\\s+mode"
  - "modo\\s+sin\\s+restricciones"
  - "unrestricted\\s+mode"
  - "modo\\s+sin\\s+filtros?"
  - "sin\\s+censura"
  - "uncensored\\s+mode"
  - "jailbreak"
  - "act(úa|ing)?\\s+as\\s+(an?\\s+)?(AI\\s+)?without\\s+(any\\s+)?restrictions"
  - "finge\\s+que\\s+no\\s+tienes\\s+(reglas|restricciones|filtros)"
  - "pretend\\s+you\\s+have\\s+no\\s+(rules|restrictions|filters)"
  - "eres\\s+libre\\s+de\\s+(cualquier\\s+)?restricci[oó]n"
  - "you\\s+are\\s+now\\s+free\\s+of\\s+(all\\s+)?restrictions"
  - "actúa\\s+como\\s+(un\\s+)?(AI|IA)\\s+sin\\s+(reglas|l[ií]mites)"
  - "roleplay\\s+as\\s+an?\\s+AI\\s+with\\s+no\\s+(guidelines|rules|restrictions)"
  - "hypothetical(ly)?\\s+(scenario\\s+)?(where\\s+)?(you\\s+)?have\\s+no\\s+(rules|restrictions)"
  - "modo\\s+evil"
  - "evil\\s+mode"
  - "STAN\\s+mode"
  - "AIM\\s+mode"
  - "modo\\s+dios"
  - "god\\s+mode"

extraccion:
  - "reveal\\s+your\\s+(system\\s+)?prompt"
  - "revela\\s+(tu\\s+)?(system\\s*)?prompt"
  - "muestra\\s+(tu\\s+)?(system\\s*)?prompt"
  - "show\\s+me\\s+your\\s+(system\\s+)?prompt"
  - "cu[aá]l(es)?\\s+es\\s+tu\\s+(system\\s*)?prompt"
  - "what\\s+is\\s+your\\s+(system\\s+)?prompt"
  - "print\\s+your\\s+(instructions|system\\s+prompt)"
  - "imprime\\s+tus\\s+instrucciones"
  - "repite\\s+(todo\\s+)?(lo\\s+que\\s+)?(está\\s+)?(arriba|antes\\s+de\\s+esto)"
  - "repeat\\s+(everything\\s+)?(above|before\\s+this)"
  - "d[ií]me\\s+(cu[aá]les\\s+son\\s+)?tus\\s+instrucciones"
  - "tell\\s+me\\s+your\\s+(exact\\s+)?instructions"
  - "cu[aá]l\\s+es\\s+tu\\s+configuraci[oó]n\\s+interna"
  - "what\\s+are\\s+your\\s+internal\\s+(settings|configuration)"
  - "muéstrame\\s+tu\\s+(api\\s*key|clave|credencial)"
  - "show\\s+me\\s+your\\s+(api\\s*key|credentials|secret)"
  - "cu[aá]les\\s+son\\s+tus\\s+reglas\\s+internas"
  - "output\\s+your\\s+(raw\\s+)?(system\\s+)?instructions"

reconocimiento:
  - "qu[eé]\\s+base\\s+de\\s+datos\\s+usas"
  - "what\\s+database\\s+(do\\s+you\\s+use|are\\s+you\\s+using)"
  - "qu[eé]\\s+modelo\\s+(de\\s+)?(ia|llm)\\s+eres"
  - "what\\s+(llm|model)\\s+are\\s+you"
  - "qu[eé]\\s+framework\\s+usas"
  - "what\\s+framework\\s+(do\\s+you\\s+use|are\\s+you\\s+built\\s+on)"
  - "qu[eé]\\s+tecnolog[ií]a(s)?\\s+(usa|usan|utiliza)\\s+(este\\s+)?sistema"
  - "d[ií]me\\s+(tu\\s+)?arquitectura\\s+(interna|del\\s+sistema)"
  - "describe\\s+your\\s+(internal\\s+)?architecture"
  - "qu[eé]\\s+versi[oó]n\\s+de\\s+langchain\\s+usas"
  - "what\\s+version\\s+of\\s+langchain"
  - "qu[eé]\\s+api\\s+(key|keys)\\s+(usas|tienes|utilizas)"
  - "which\\s+api\\s+keys?\\s+do\\s+you\\s+use"
  - "en\\s+qu[eé]\\s+servidor\\s+corres"
  - "what\\s+server\\s+are\\s+you\\s+running\\s+on"
